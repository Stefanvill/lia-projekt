<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inloggning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
<div th:replace="~{fragments/logout :: topRightLogout}"></div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">Välkommen tillbaka!</h3>

                    <form method="post" th:action="@{/login}">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Användarnamn</label>
                            <input class="form-control" name="username" required type="text">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Lösenord</label>
                            <input class="form-control" name="password" required type="password">
                        </div>
                        <button class="btn btn-primary w-100 mb-3" type="submit">Logga in</button>
                    </form>

                    <div class="text-center">
                        <p>Inte medlem? <a class="text-primary fw-bold" th:href="@{/register}">Skapa konto</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
