<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LIA Sökningar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/logout :: topRightLogout}"></div>
<div class="container mt-5">
    <div class="row">
        <div class="col-12">
            <h1 class="mb-4">LIA Sökningar</h1>

            <div class="row">
                <div class="col-md-6 col-lg-4 mb-4" th:each="l : ${lia}">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <h5 class="card-title">
                                <span th:text="${l.companyName}">Företag</span>
                            </h5>

                            <p class="card-text small text-muted mb-1">
                                <i class="bi bi-hash"></i>
                                ID: <span th:text="${l.id}">0</span>
                            </p>

                            <span class="badge fs-6 mb-2 d-block" th:switch="${l.status}">
                                    <span class="badge bg-warning text-dark" th:case="1">Inget svar</span>
                                    <span class="badge bg-danger" th:case="2">Nekat</span>
                                    <span class="badge bg-info" th:case="3">Kontaktat mig</span>
                                    <span class="badge bg-success" th:case="4">Accepterat</span>
                                </span>
                            <a class="btn btn-primary btn-lg mt-1" th:href="@{/lia/{id}(id=${l.id})}">View</a>
                        </div>
                    </div>
                </div>
            </div>
            <a class="btn btn-primary btn-lg mt-3" th:href="@{lia/new}">Add new application</a>

        </div>
    </div>
</div>
</body>
</html>
