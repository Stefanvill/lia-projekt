<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Ny LIA-post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div th:replace="~{fragments/logout :: topRightLogout}"></div>
<div class="container py-4 px-3">
    <h1 class="fs-3 mb-4">Ny LIA-sökning</h1>

    <form method="post" th:action="@{/lia}" th:object="${liaSearch}">

        <div class="mb-3">
            <label class="form-label" for="companyName">Företagsnamn *</label>
            <input class="form-control" id="companyName" th:field="*{companyName}" type="text">
        </div>

        <div class="mb-3">
            <label class="form-label" for="phoneNumber">Telefonnummer</label>
            <input class="form-control" id="phoneNumber" th:field="*{phoneNumber}" type="tel">
        </div>

        <div class="mb-3">
            <label class="form-label" for="email">E-post</label>
            <input class="form-control" id="email" th:field="*{email}" type="email">
        </div>

        <div class="mb-3">
            <label class="form-label" for="website">Webbplats</label>
            <input class="form-control" id="website" th:field="*{website}" type="url">
        </div>

        <div class="mb-3">
            <label class="form-label" for="contactPerson">Kontaktperson</label>
            <input class="form-control" id="contactPerson" th:field="*{contactPerson}" type="text">
        </div>

        <div class="mb-3">
            <label class="form-label" for="address">Adress</label>
            <input class="form-control" id="address" th:field="*{address}" type="text">
        </div>

        <div class="mb-3">
            <label class="form-label" for="city">Stad</label>
            <input class="form-control" id="city" th:field="*{city}" type="text">
        </div>

        <div class="mb-3">
            <label class="form-label" for="notes">Noteringar</label>
            <textarea class="form-control" id="notes" rows="3" th:field="*{notes}"></textarea>
        </div>

        <div class="d-grid d-sm-flex gap-2">
            <button class="btn btn-primary" type="submit">Spara LIA-post</button>
            <a class="btn btn-secondary" th:href="@{/lia}">Avbryt</a>
        </div>
    </form>
</div>
</body>
</html>
