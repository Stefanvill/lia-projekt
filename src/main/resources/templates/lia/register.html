<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Skapa konto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">
<div th:replace="~{fragments/logout :: topRightLogout}"></div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">Skapa nytt konto</h3>

                    <form method="post" th:action="@{/register}" th:object="${user}">
                        <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
                            <span th:errors="*{username}">Felmeddelande</span>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Användarnamn</label>
                            <input class="form-control" required th:field="*{username}" type="text">
                            <div class="text-danger small" th:errors="*{username}"
                                 th:if="${#fields.hasErrors('username')}">Fel
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Lösenord</label>
                            <input class="form-control" required th:field="*{password}" type="password">
                            <div class="text-danger small" th:errors="*{password}"
                                 th:if="${#fields.hasErrors('password')}">Fel
                            </div>
                        </div>

                        <button class="btn btn-success w-100 mb-3" type="submit">Skapa konto</button>
                    </form>

                    <div class="text-center">
                        <p>Har redan konto? <a class="text-primary fw-bold" th:href="@{/login}">Logga in här</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
